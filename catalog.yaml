# MTG Sealed Product Catalog
# ---------------------------------------------------------------------------
# To add a new set: add a new top-level key (set code, uppercase).
# To add a new product to a set: append an entry to that set's list.
# Required fields:
#   key          internal product key (e.g. play_box, draft_box, bundle)
#   label        human-readable name shown in API responses
#   ebay_query   keyword string sent to eBay Browse API
# Optional fields (needed for EV / deals endpoints):
#   ev_set_code  set code passed to the EV model (usually same as set key)
#   ev_kind      "box" | "draft_box" — selects the EV model variant
#   product_kind used for eBay title filtering (play_box, set_box, draft_box, collector_box)
# Optional eBay overrides (per-product defaults; callers may still override):
#   ebay_filter  Browse API filter string (e.g. "conditionIds:{1000}")
#   default_sort Browse API sort (e.g. price, newlyListed, bestMatch)
#
# NOTE: All EV-enabled box products use default_sort: price so that eBay
# returns the cheapest listings first rather than "best match". Without this,
# eBay's relevance ranking can bury the cheapest listings beyond the 200-item
# page limit, making the spread calculation incomplete.
# ---------------------------------------------------------------------------

MH3:
  - key: play_box
    label: Play Booster Box
    ebay_query: "Modern Horizons 3 play booster box"
    ev_set_code: MH3
    ev_kind: box
    product_kind: play_box
    default_sort: price
  - key: bundle
    label: Bundle
    ebay_query: "Modern Horizons 3 bundle"

